name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build EXE
        shell: pwsh
        run: >
          uv run pyinstaller --onefile --windowed
          --collect-all nicegui
          --name Notes
          app/main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Notes-Windows
          path: dist/Notes.exe